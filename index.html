<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Arpita ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#ffd6e7,#fff);
    text-align:center;
    overflow:hidden;
}

.container{
    margin-top:80px;
}

h1{
    color:#ff4081;
}

img{
    width:220px;
    border-radius:15px;
    margin-bottom:20px;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff4081;
    color:white;
}

#no{
    background:#eee;
}

#result{
    display:none;
    margin-top:30px;
}

.hearts{
    position:fixed;
    color:red;
    font-size:25px;
    animation:float 4s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Arpita, Will You Be My Girlfriend? ❤️</h1>

<img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=600" alt="love">

<br>

<button id="yes" onclick="yesClicked()">Yes ❤️</button>
<button id="no" onmouseover="moveNo()">No 🙈</button>

<div id="result">
    <h2>🎉 Yay! You Said YES! 🎉</h2>
    <p>You made me the happiest person alive ❤️</p>
</div>

</div>

<script>

function moveNo(){
    let btn=document.getElementById("no");

    let x=Math.random()*(window.innerWidth-150);
    let y=Math.random()*(window.innerHeight-100);

    btn.style.position="absolute";
    btn.style.left=x+"px";
    btn.style.top=y+"px";
}

function yesClicked(){
    document.getElementById("result").style.display="block";
}

setInterval(()=>{
    let heart=document.createElement("div");
    heart.innerHTML="❤️";
    heart.className="hearts";
    heart.style.left=Math.random()*100+"vw";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },4000);

},500);

</script>

</body>
</html>
